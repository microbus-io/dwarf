name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test (SQLite in-memory)
        run: go test ./... -count=1 -timeout 2m

  postgres:
    name: PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SEQUEL_TESTING_DSN: postgres://postgres:postgres@127.0.0.1:5432/dwarf_%d?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test (PostgreSQL)
        run: go test ./... -count=1 -timeout 2m

  mysql:
    name: MySQL
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SEQUEL_TESTING_DSN: root:root@tcp(127.0.0.1:3306)/dwarf_%d
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test (MySQL)
        run: go test ./... -count=1 -timeout 2m

  sqlserver:
    name: SQL Server
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: Dwarf_CI_Pass_2026
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P Dwarf_CI_Pass_2026 -Q 'SELECT 1' -b"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s
    env:
      SEQUEL_TESTING_DSN: sqlserver://sa:Dwarf_CI_Pass_2026@127.0.0.1:1433?database=dwarf_%d
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # READ_COMMITTED_SNAPSHOT is required to avoid deadlocks
      - name: Enable READ_COMMITTED_SNAPSHOT on test databases
        run: |
          docker run --rm --network host mcr.microsoft.com/mssql/server:2022-latest \
            /opt/mssql-tools18/bin/sqlcmd -C -b -S 127.0.0.1,1433 -U sa -P 'Dwarf_CI_Pass_2026' \
            -Q "ALTER DATABASE model SET READ_COMMITTED_SNAPSHOT ON;"
      - name: Test (SQL Server)
        run: go test ./... -count=1 -timeout 2m
